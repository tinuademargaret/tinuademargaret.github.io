# Memory constellation data.
# Each star is one memory. x/y are percentages (0-100) of the star map, so the
# layout scales on any screen. Add a new memory by appending to `memories`, then
# link it up by adding pairs to `connections`. `glow` (1-3) just tweaks star size.
# Use `thumb_position` when a circular thumbnail needs a custom crop focus.

memories:
  - id: memory-1
    title: "I used to build lego robots"
    caption: "Started out my coding journey with lego and tetrix robots as part of a robotics club in uni. I had the opportunity to demo stuff at events and conferences. I also taught kids how to code and build legorobots."
    # date: "Mar 2026"
    image: /assets/img/scrapbook/ilabroc_spac.jpg
    alt: "Open notebook filled with handwritten brainstorm notes"
    x: 14
    y: 26
    glow: 2

